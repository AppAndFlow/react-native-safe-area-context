name: Android build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android.yml'
      - 'android/**'
      - 'common/**'
      - 'example/android/**'
  pull_request:
    paths:
      - '.github/workflows/android.yml'
      - 'android/**'
      - 'common/**'
      - 'example/android/**'

jobs:
  android-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Restore yarn workspaces
        id: yarn-cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install
      - name: Install example app dependencies
        run: yarn install
        working-directory: example
      - name: Build android example app with new arch disabled
        if: runner.os != 'Windows'
        run: ./gradlew assembleDebug -PnewArchEnabled=false
        working-directory: example/android
      - name: Build android example app with new arch disabled (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          subst W: "%GITHUB_WORKSPACE%"
          cd /D W:\example\android
          call gradlew.bat assembleDebug -PnewArchEnabled=false
  android-build-fabric:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v1
        with:
          node-version: 20.x
      - uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Restore yarn workspaces
        id: yarn-cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install
      - name: Install example app dependencies
        run: yarn install
        working-directory: example
      - name: Build android example app with new arch enabled
        if: runner.os != 'Windows'
        run: ./gradlew assembleDebug -PnewArchEnabled=true
        working-directory: example/android
      - name: Build android example app with new arch enabled (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          subst W: "%GITHUB_WORKSPACE%"
          cd /D W:\example\android
          call gradlew.bat assembleDebug -PnewArchEnabled=true
