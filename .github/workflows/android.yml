name: Android build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android.yml'
      - 'android/**'
      - 'common/**'
      - 'example/android/**'
  pull_request:
    paths:
      - '.github/workflows/android.yml'
      - 'android/**'
      - 'common/**'
      - 'example/android/**'

jobs:
  android-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Restore yarn workspaces
        id: yarn-cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install
      - name: Install example app dependencies
        run: yarn install
        working-directory: example
      - name: Build android example app with new arch disabled
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # subst the workspace to a short drive to avoid Windows MAX_PATH
            # in CMake-generated object file names from autolinked codegen.
            MSYS_NO_PATHCONV=1 cmd /c 'subst W: "%GITHUB_WORKSPACE%" && cd /D W:\example\android && call gradlew.bat assembleDebug -PnewArchEnabled=false'
          else
            cd example/android
            ./gradlew assembleDebug -PnewArchEnabled=false
          fi
  android-build-fabric:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v1
        with:
          node-version: 20.x
      - uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Restore yarn workspaces
        id: yarn-cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install
      - name: Install example app dependencies
        run: yarn install
        working-directory: example
      - name: Build android example app with new arch enabled
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # subst the workspace to a short drive to avoid Windows MAX_PATH
            # in CMake-generated object file names from autolinked codegen.
            MSYS_NO_PATHCONV=1 cmd /c 'subst W: "%GITHUB_WORKSPACE%" && cd /D W:\example\android && call gradlew.bat assembleDebug -PnewArchEnabled=true'
          else
            cd example/android
            ./gradlew assembleDebug -PnewArchEnabled=true
          fi
